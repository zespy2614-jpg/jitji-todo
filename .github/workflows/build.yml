name: Build APK

on:
  push:
    branches:
      - claude/build-task-reminder-apk-kP4Xv
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    env:
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Lint (non-blocking)
        continue-on-error: true
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-v${{ env.BUILD_NUMBER }}
          path: app/build/reports/lint-results-debug.*
          if-no-files-found: ignore

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk "artifacts/JitjiTodo-v${BUILD_NUMBER}.apk"

      - name: Verify APK contents
        run: |
          set -e
          APK="artifacts/JitjiTodo-v${BUILD_NUMBER}.apk"
          AAPT=$(ls -d $ANDROID_HOME/build-tools/*/aapt2 2>/dev/null | sort -r | head -n1)
          if [ -z "$AAPT" ]; then AAPT=$(command -v aapt2); fi
          echo "Using aapt2: $AAPT"

          MAN=$("$AAPT" dump xmltree "$APK" --file AndroidManifest.xml)
          echo "--- AndroidManifest.xml (xmltree) ---"
          echo "$MAN"
          echo "--- end manifest ---"

          fail=0
          checkm() {
            if echo "$MAN" | grep -qF "$1"; then
              echo "OK: $2"
            else
              echo "MISSING: $2  (pattern: $1)"
              fail=1
            fi
          }

          checkm 'package="com.jitji.todo"' "package name"
          checkm 'android.permission.POST_NOTIFICATIONS' "POST_NOTIFICATIONS permission"
          checkm 'android.permission.FOREGROUND_SERVICE"' "FOREGROUND_SERVICE permission"
          checkm 'FOREGROUND_SERVICE_SPECIAL_USE' "FGS special use permission"
          checkm 'android.permission.SCHEDULE_EXACT_ALARM' "SCHEDULE_EXACT_ALARM"
          checkm 'android.permission.RECEIVE_BOOT_COMPLETED' "RECEIVE_BOOT_COMPLETED"
          checkm 'android.permission.REQUEST_INSTALL_PACKAGES' "REQUEST_INSTALL_PACKAGES"
          checkm 'REQUEST_IGNORE_BATTERY_OPTIMIZATIONS' "REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"
          checkm 'android.permission.INTERNET' "INTERNET"
          checkm '.LockscreenService' "LockscreenService declared"
          checkm '.RestartReceiver' "RestartReceiver declared"
          checkm '.BootReceiver' "BootReceiver declared"
          checkm '.ReminderReceiver' "ReminderReceiver declared"
          checkm 'FileProvider' "FileProvider declared"
          checkm 'foregroundServiceType' "foregroundServiceType attribute"
          checkm 'android.permission.USE_FULL_SCREEN_INTENT' "USE_FULL_SCREEN_INTENT"

          echo "--- signing fingerprint ---"
          keytool -printcert -jarfile "$APK" 2>/dev/null | grep -E 'Owner|SHA-256' | head -6 || true

          if [ $fail -ne 0 ]; then
            echo "=== APK verification FAILED ==="
            exit 1
          fi
          echo "=== All APK checks passed ==="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JitjiTodo-v${{ env.BUILD_NUMBER }}
          path: artifacts/JitjiTodo-v${{ env.BUILD_NUMBER }}.apk
          if-no-files-found: error

      - name: Create or update release
        if: github.ref == 'refs/heads/claude/build-task-reminder-apk-kP4Xv' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-${{ github.ref_name }}
          name: JitjiTodo build (${{ github.ref_name }}) v${{ env.BUILD_NUMBER }}
          body: |
            자동 빌드 - 빌드 번호 v${{ env.BUILD_NUMBER }}
            커밋: ${{ github.sha }}
          files: artifacts/JitjiTodo-v${{ env.BUILD_NUMBER }}.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
